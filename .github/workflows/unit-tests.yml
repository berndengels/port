name: Unit-Tests
on:
    push:
        branches: [ testing ]
    pull_request:
        branches: [ testing ]

jobs:
    phpunit:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v2
            -   name: Prepare The Environment
                run: cp .env.testing.tpl .env
            -   name: Create Database
                run: |
                    sudo systemctl start mysql
                    mysql --user="root" --password="root" -e "CREATE DATABASE port_test character set UTF8mb4 collate utf8mb4_bin;"
            -   name: Install Composer Dependencies
                run: composer install --no-progress --prefer-dist --optimize-autoloader
            -   name: Install JS Dependencies
                run: npm install
            -   name: Generate APP key
                run: php artisan key:generate
            -   name: Mix Build JS/CSS
                run: npm run dev
            #            - name: Run database migrations
            #              run: php artisan migrate:fresh --drop-views --database=testing --env=testing --path=database/migrations/testing
            #            - name: Run database seeds
            #              run: php artisan db:seed --database=testing --env=testing
            -   name: Run Laravel Server
                run: php artisan serve --env=testing --no-reload &
            -   name: Run Unit-Tests
                env:
                    APP_URL: "http://127.0.0.1:8000"
                run: php artisan test --no-interaction --env=testing
