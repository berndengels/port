name: DuskTests
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    dusk-php:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - name: Prepare The Environment
#              run: cp .env.example .env
              run: cp .env.dusk.local .env
            - name: Create Database
              run: |
                  sudo systemctl start mysql
                  mysql --user="root" --password="root" -e "CREATE DATABASE port_demo character set UTF8mb4 collate utf8mb4_bin;"
            - name: Install Composer Dependencies
              run: composer install --no-progress --prefer-dist --optimize-autoloader
            - name: Install JS Dependencies
              run: npm install
            - name: Mix Build JS/CSS
              run: npm run dev
            - name: Run database migrations
              run: php artisan migrate --database=demo
            - name: Run database seeds
              run: php artisan db:seed --database=demo
            - name: Install dusk
              run: php artisan dusk:install
            - name: Upgrade Chrome Driver
              run: php artisan dusk:chrome-driver `/opt/google/chrome/chrome --version | cut -d " " -f3 | cut -d "." -f1`
            - name: Start Chrome Driver
              run: ./vendor/laravel/dusk/bin/chromedriver-linux &
            - name: Run Laravel Server
              run: php artisan serve --no-reload &
            - name: Run Dusk Tests
              env:
                  APP_URL: "http://127.0.0.1:8000"
              run: php artisan pest:dusk
            - name: Upload Screenshots
              if: failure()
              uses: actions/upload-artifact@v2
              with:
                  name: screenshots
                  path: tests/Browser/screenshots
            - name: Upload Console Logs
              if: failure()
              uses: actions/upload-artifact@v2
              with:
                  name: console
                  path: tests/Browser/console
